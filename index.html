      background: linear-gradient(135deg, #0f0f1a, #1a0033);

      line-height: 1.8;
    }
    
    header {
      background: linear-gradient(90deg, #1a1a2e, #6a0dad);
      padding: 30px 20px;

    }
    
    header h1 {
      color: #e0c3fc;

    }

    }
    
    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }
    
    .readme-content {
      background: rgba(30, 30, 48, 0.8);
      border: 1px solid #6a0dad;
      border-radius: 15px;
      padding: 40px;
      box-shadow: 0 5px 20px rgba(106, 13, 173, 0.3);
    }
    
    .readme-content h1 {
      color: #e0c3fc;
      font-size: 28px;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #6a0dad;
    }
    
    .readme-content h2 {
      color: #d1c4e9;
      font-size: 22px;
      margin-top: 25px;
      margin-bottom: 15px;
    }
    
    .readme-content p {
      margin-bottom: 15px;
      color: #cccccc;
      font-size: 15px;
    }
    
    .readme-content ul {
      list-style: none;
      margin: 15px 0 15px 20px;
    }
    
    .readme-content li {
      color: #cccccc;
      margin-bottom: 12px;
      font-size: 15px;
      line-height: 1.6;
    }
    
    .readme-content li:before {
      content: "→ ";
      color: #ff4d6d;
      font-weight: bold;
      margin-right: 8px;
    }
    
    .readme-content a {
      color: #ff4d6d;
      text-decoration: none;
      transition: 0.3s;
      font-weight: bold;
    }
    
    .readme-content a:hover {
      color: #ff6a82;
      text-decoration: underline;
    }
    
    .readme-content code {
      background: #2d2d44;
      color: #ffcc00;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: "Courier New", monospace;
    }
    
    .readme-content hr {
      border: none;
      border-top: 1px solid #6a0dad;
      margin: 30px 0;
    }
    
    footer {
      text-align: center;
      color: #999;
      margin-top: 40px;
      padding-bottom: 20px;
      font-size: 14px;
    }
    
    footer p {

    }
